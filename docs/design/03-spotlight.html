<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pilot — Spotlight</title>
<style>
  :root {
    --bg: #08080c;
    --bg-soft: #0d0d13;
    --panel: #14141d;
    --panel-2: #1a1a26;
    --border: #212130;
    --border-2: #2c2c3e;
    --text: #f1f1f6;
    --dim: #8a8a9c;
    --dim-2: #57576a;
    --accent: #8b7bff;
    --cyan: #4fd6e0;
    --green: #54d98c;
    --violet: #b69cff;
    --grad: linear-gradient(110deg, #8b7bff, #4fd6e0);
    --add:#54d98c; --del:#f0857c;
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font: 15px/1.6 var(--sans); -webkit-font-smoothing: antialiased; overflow: hidden; }
  button { font: inherit; cursor: pointer; color: inherit; border: none; background: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #1e1e2a; border-radius: 8px; }

  .devbar { position: fixed; top: 12px; right: 14px; z-index: 110; display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .devbar button { font: 11px var(--mono); color: var(--dim); padding: 4px 9px; border-radius: 6px; }
  .devbar button.on { background: var(--panel-2); color: var(--text); }

  /* ambient drifting glow — signature identity */
  .amb { position: fixed; inset: -20%; z-index: 0; pointer-events: none; opacity: .55; transition: opacity 1s; filter: blur(40px);
    background: radial-gradient(40% 40% at 25% 30%, rgba(139,123,255,.25), transparent 70%), radial-gradient(38% 38% at 78% 70%, rgba(79,214,224,.20), transparent 70%); animation: drift 18s ease-in-out infinite alternate; }
  body.busy .amb { opacity: 1; animation-duration: 7s; }
  @keyframes drift { from { transform: translate(-4%,-2%) scale(1); } to { transform: translate(5%,3%) scale(1.12); } }

  .shell { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }
  .top { display: flex; align-items: center; gap: 10px; padding: 14px 22px; }
  .top .mk { width: 27px; height: 27px; border-radius: 8px; background: var(--grad); display: grid; place-items: center; color: #07070c; font-weight: 900; font-size: 13px; }
  .top .nm { font-weight: 700; letter-spacing: -.2px; }
  .top .crumb { font: 12px var(--mono); color: var(--dim); border-radius: 7px; padding: 3px 8px; }
  .top .crumb:hover { background: var(--panel); color: var(--text); }
  .top .sp { flex: 1; }
  .top .conn { display: flex; align-items: center; gap: 7px; font: 11.5px var(--mono); color: var(--dim); }
  .top .conn .d { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); }

  .scroll { flex: 1; overflow-y: auto; }
  .hero { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 22px; }
  .hero.gone { display: none; }
  .greet { font-size: clamp(27px,4.4vw,40px); font-weight: 770; letter-spacing: -1.2px; text-align: center; line-height: 1.12; }
  .greet .g { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tag { color: var(--dim); margin: 11px 0 30px; text-align: center; }
  .ghosts { display: flex; gap: 9px; flex-wrap: wrap; justify-content: center; max-width: 540px; margin-top: 22px; }
  .ghost { font-size: 13px; color: var(--dim); border: 1px solid var(--border); border-radius: 999px; padding: 8px 15px; transition: .15s; background: rgba(20,20,29,.5); }
  .ghost:hover { color: var(--text); border-color: var(--border-2); transform: translateY(-1px); }

  .conv { display: none; max-width: 720px; margin: 0 auto; width: 100%; padding: 12px 22px 160px; flex-direction: column; gap: 22px; }
  .conv.on { display: flex; }
  .u { align-self: flex-end; max-width: 80%; background: var(--panel-2); border: 1px solid var(--border); padding: 11px 16px; border-radius: 16px 16px 5px 16px; }
  .turn { display: flex; gap: 13px; }
  .turn .rail .mk { width: 24px; height: 24px; border-radius: 8px; background: var(--grad); display: grid; place-items: center; color: #07070c; font-weight: 900; font-size: 12px; }
  .turn .body { flex: 1; min-width: 0; }
  .rbadge { display: inline-block; font: 10px var(--mono); text-transform: uppercase; letter-spacing: .06em; color: var(--dim-2); margin-bottom: 6px; }
  .prose { font-size: 15px; line-height: 1.7; }
  .prose code { font: 13px var(--mono); background: var(--panel-2); padding: 1px 6px; border-radius: 5px; }
  .codeblk { font: 13px/1.6 var(--mono); background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; margin-top: 10px; white-space: pre-wrap; color: #cfd8ff; }
  .cur { display: inline-block; width: 8px; height: 16px; background: var(--accent); vertical-align: -3px; animation: blink 1s steps(2) infinite; } @keyframes blink { 50% { opacity: 0; } }

  /* insyn chip + inline expansion */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .chip { display: inline-flex; align-items: center; gap: 7px; font: 11.5px var(--mono); color: var(--dim); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; transition: .12s; background: rgba(20,20,29,.5); }
  .chip:hover { color: var(--text); border-color: var(--border-2); }
  .chip.art { color: var(--cyan); border-color: rgba(79,214,224,.3); }
  .insteps { display: none; margin-top: 10px; border-left: 1.5px solid var(--border); padding-left: 14px; flex-direction: column; gap: 0; }
  .insteps.on { display: flex; }
  .istep { display: flex; gap: 10px; padding: 3px 0; align-items: flex-start; }
  .istep .dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--green); color: var(--green); display: grid; place-items: center; font-size: 7px; margin-top: 3px; flex-shrink: 0; }
  .istep .t { font: 12.5px var(--sans); color: var(--dim); } .istep .t b { color: var(--text); } .istep .t .ex { font: 11.5px var(--mono); color: var(--violet); }

  /* spotlight command bar */
  .hero .barwrap { width: 100%; max-width: 600px; }
  .dock { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; display: flex; justify-content: center; padding: 0 18px 22px; pointer-events: none;
    background: linear-gradient(to top, var(--bg) 35%, transparent); }
  .dock .barwrap { width: 100%; max-width: 640px; pointer-events: auto; }
  .dock { display: none; } .dock.on { display: flex; }
  .bar { background: rgba(18,18,26,.86); backdrop-filter: blur(16px); border: 1.5px solid var(--border-2); border-radius: 17px; box-shadow: 0 18px 60px rgba(0,0,0,.5); transition: .18s; }
  .bar:focus-within { border-color: transparent; background: linear-gradient(rgba(18,18,26,.92),rgba(18,18,26,.92)) padding-box, var(--grad) border-box; box-shadow: 0 20px 70px rgba(139,123,255,.2); }
  .bartop { display: flex; align-items: center; gap: 9px; padding: 8px 12px 0; font: 10.5px var(--mono); color: var(--dim-2); }
  .bartop .brain { display: flex; align-items: center; gap: 7px; color: var(--dim); }
  .bartop .brain .orb { width: 8px; height: 8px; border-radius: 50%; background: var(--grad); box-shadow: 0 0 8px rgba(139,123,255,.6); }
  body.busy .bartop .brain .orb { animation: breathe 1.1s infinite; } @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }
  .bartop .brain .live { color: var(--violet); }
  .bartop .agent { margin-left: auto; position: relative; }
  .bartop .agent-trigger { color: var(--dim); transition: .12s; }
  .bartop .agent-trigger:hover { color: var(--text); }
  .bartop .agent .menu { position: absolute; bottom: 130%; right: 0; background: var(--panel); border: 1px solid var(--border-2); border-radius: 11px; padding: 5px; display: none; flex-direction: column; gap: 2px; min-width: 175px; box-shadow: 0 16px 40px rgba(0,0,0,.5); }
  .bartop .agent.open .menu { display: flex; }
  .bartop .agent .menu button { text-align: left; font: 12px var(--sans); color: var(--dim); padding: 8px 10px; border-radius: 8px; }
  .bartop .agent .menu button:hover { background: var(--panel-2); color: var(--text); } .bartop .agent .menu button.on::after { content:" ✓"; color: var(--cyan); }
  .barmain { display: flex; align-items: flex-end; gap: 9px; padding: 6px 9px 9px 15px; }
  .bar textarea { flex: 1; background: none; border: none; resize: none; outline: none; color: var(--text); font: 15px var(--sans); max-height: 140px; padding: 5px 0; }
  .bar textarea::placeholder { color: var(--dim-2); }
  .send { width: 38px; height: 38px; border-radius: 12px; background: var(--grad); color: #07070c; font-weight: 900; font-size: 16px; display: grid; place-items: center; flex-shrink: 0; transition: .15s; }
  .send:disabled { background: var(--border-2); color: var(--dim-2); } .send:not(:disabled):hover { transform: scale(1.06); }

  /* focus takeover */
  .takeover { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; padding: 6vh 22px 22px; background: rgba(5,5,9,.55); backdrop-filter: blur(7px); }
  .takeover.on { display: flex; animation: fade .25s; } @keyframes fade { from { opacity: 0; } }
  .tpanel { width: 940px; max-width: 100%; max-height: 86vh; background: var(--panel); border: 1px solid var(--border-2); border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,.6); animation: pop .3s cubic-bezier(.2,.9,.3,1); }
  @keyframes pop { from { opacity: 0; transform: translateY(18px) scale(.98); } }
  .tpanel .th { display: flex; align-items: center; gap: 10px; padding: 13px 17px; border-bottom: 1px solid var(--border); font: 12px var(--mono); color: var(--dim); }
  .tpanel .th .nm { color: var(--text); } .tpanel .th .tg { font-size: 10px; padding: 2px 7px; border-radius: 5px; }
  .tpanel .th .x { margin-left: auto; width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; } .tpanel .th .x:hover { background: var(--panel-2); color: var(--text); }
  .tpanel .tb { padding: 20px; overflow: auto; }

  /* artifact bodies */
  .diff { font: 12.5px/1.55 var(--mono); } .diff .ln2 { padding: 1px 12px; white-space: pre-wrap; }
  .diff .ln2.add { background: rgba(84,217,140,.12); color: var(--add); } .diff .ln2.del { background: rgba(240,133,124,.12); color: var(--del); } .diff .ln2.ctx { color: var(--dim); }
  .shot { border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
  .shot .bar2 { background:#1c2230; padding:7px 11px; display:flex; gap:6px; align-items:center; }
  .shot .bar2 i { width:9px; height:9px; border-radius:50%; } .shot .bar2 i:nth-child(1){background:#ff5f57}.shot .bar2 i:nth-child(2){background:#febc2e}.shot .bar2 i:nth-child(3){background:#28c840}
  .shot .bar2 .u2 { margin-left:8px; font:10px var(--mono); color:var(--dim); background:#0f131c; padding:2px 8px; border-radius:5px; }
  .shot .win { background:linear-gradient(160deg,#0e1422,#0b0f18); padding:18px; min-height:200px; position:relative; }
  .shot .note { background:#f7f4e9; color:#222; border-radius:5px; padding:12px; font:13px var(--mono); width:65%; margin-top:34px; box-shadow:0 8px 20px rgba(0,0,0,.4); }
  .shot .mark { position:absolute; border:2px solid var(--cyan); border-radius:5px; box-shadow:0 0 0 3px rgba(79,214,224,.2); left:18px; top:18px; right:18px; height:46px; }
  .shot .mark .tagn { position:absolute; top:-9px; left:-2px; background:var(--cyan); color:#042; font:9px var(--mono); padding:0 4px; border-radius:3px; }
  .frow { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:9px; } .frow:hover { background:var(--panel-2); }
  .frow .fi { color:var(--cyan); font-size:16px; } .frow .fn { font:13px var(--mono); } .frow .fm { margin-left:auto; font:11.5px var(--mono); color:var(--dim-2); }
  .ggraph { position:relative; height:300px; }
  .ggraph svg { position:absolute; inset:0; width:100%; height:100%; }
  .gn { position:absolute; transform:translate(-50%,-50%); text-align:center; }
  .gn .o { width:54px; height:54px; border-radius:15px; display:grid; place-items:center; font-size:19px; border:1.5px solid var(--border); background:var(--panel-2); margin:0 auto 5px; transition:.3s; }
  .gn.c .o { width:66px; height:66px; border-color:rgba(139,123,255,.5); background:radial-gradient(circle at 50% 40%, rgba(139,123,255,.18), var(--panel-2)); box-shadow:0 0 24px rgba(139,123,255,.25); }
  .gn .l { font:10.5px var(--mono); color:var(--dim); }
  .gn.active .o { border-color:var(--violet); box-shadow:0 0 26px rgba(182,156,255,.5); transform:scale(1.08); }
  .ge { stroke:var(--border); stroke-width:1.5; fill:none; transition:.3s; }
  .ge.active { stroke:var(--violet); stroke-width:2.5; stroke-dasharray:5 4; animation:flow .6s linear infinite; filter:drop-shadow(0 0 4px var(--violet)); } @keyframes flow { to { stroke-dashoffset:-18; } }

  body.m .tpanel { max-height: 92vh; } body.m .takeover { padding: 4vh 12px 12px; }
</style>
</head>
<body>
<div class="amb"></div>
<div class="devbar"><button id="dvD" class="on" onclick="setDevice(false)">🖥 Desktop</button><button id="dvM" onclick="setDevice(true)">📱 Mobil</button></div>

<div class="shell">
  <header class="top">
    <div class="mk">✦</div><span class="nm">Pilot</span>
    <button class="crumb" onclick="alert('Projekt härleds men kan bytas här')">/ pilot ▾</button>
    <span class="sp"></span>
    <span class="conn"><span class="d"></span> ansluten</span>
  </header>

  <div class="scroll" id="scroll">
    <div class="hero" id="hero">
      <div>
        <div class="greet">God kväll, Lucas.<br><span class="g">Vad ska vi göra?</span></div>
        <div class="tag">Skriv vad du vill — Pilot listar ut hur, och visar resultatet i fokus.</div>
      </div>
      <div class="barwrap">
        <div class="bar">
          <div class="bartop"><span class="brain"><span class="orb"></span> <span id="bt0">gemma4 · redo</span></span>
            <div class="agent" id="ag0"><button class="agent-trigger" onclick="toggleAgent('ag0',event)">⚡ lokal ▾</button><div class="menu"><button class="on" onclick="pickAgent('lokal',event)">⚡ Lokal (qwen2.5-coder)</button><button onclick="pickAgent('Claude Code',event)">◆ Claude Code</button><button onclick="pickAgent('Codex',event)">◇ Codex</button></div></div>
          </div>
          <div class="barmain"><textarea id="ta0" rows="1" placeholder="Fråga Pilot…" oninput="mirror(this)" onkeydown="onKey(event,'ta0')"></textarea><button class="send" id="go0" disabled onclick="send('ta0')">➤</button></div>
        </div>
        <div class="ghosts">
          <button class="ghost" onclick="seed('Lägg till en vision-flagga i backend/config.py')">✎ Redigera kod</button>
          <button class="ghost" onclick="seed('Öppna Anteckningar och skriv Hej')">🖥 Styr datorn</button>
          <button class="ghost" onclick="seed('Hitta mitt CV i Downloads')">🔎 Hitta mitt CV</button>
          <button class="ghost" onclick="seed('Bevisa att roten ur 2 är irrationell')">🧠 Reasoning</button>
        </div>
      </div>
    </div>
    <div class="conv" id="conv"></div>
  </div>

  <div class="dock" id="dock">
    <div class="barwrap">
      <div class="bar">
        <div class="bartop"><span class="brain"><span class="orb"></span> <span id="bt1">gemma4 · redo</span></span>
          <div class="agent" id="ag1"><button class="agent-trigger" onclick="toggleAgent('ag1',event)">⚡ lokal ▾</button><div class="menu"><button class="on" onclick="pickAgent('lokal',event)">⚡ Lokal (qwen2.5-coder)</button><button onclick="pickAgent('Claude Code',event)">◆ Claude Code</button><button onclick="pickAgent('Codex',event)">◇ Codex</button></div></div>
        </div>
        <div class="barmain"><textarea id="ta1" rows="1" placeholder="Fortsätt…" oninput="mirror(this)" onkeydown="onKey(event,'ta1')"></textarea><button class="send" id="go1" disabled onclick="send('ta1')">➤</button></div>
      </div>
    </div>
  </div>
</div>

<!-- focus takeover -->
<div class="takeover" id="takeover" onclick="if(event.target===this)closeTakeover()">
  <div class="tpanel"><div class="th"><span id="tkTitle" class="nm">Scen</span><span id="tkTag" class="tg"></span><button class="x" onclick="closeTakeover()">✕</button></div><div class="tb" id="tkBody"></div></div>
</div>

<script>
  const $=id=>document.getElementById(id);
  const scroll=$('scroll'),conv=$('conv'),hero=$('hero'),dock=$('dock');
  let busy=false; const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  function el(h){ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; }
  function down(){ scroll.scrollTop=scroll.scrollHeight; }
  function autosize(e){ e.style.height='auto'; e.style.height=Math.min(e.scrollHeight,140)+'px'; }
  function tg(){ $('go0').disabled=!$('ta0').value.trim()||busy; $('go1').disabled=!$('ta1').value.trim()||busy; }
  function mirror(s){ $('ta0').value=s.value; $('ta1').value=s.value; autosize($('ta0')); autosize($('ta1')); tg(); }
  function onKey(e,id){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(id); } }
  function seed(t){ $('ta0').value=t; $('ta1').value=t; tg(); (busy?$('ta1'):$('ta0')).focus(); }
  function setBrain(txt){ $('bt0').textContent=txt; $('bt1').textContent=txt; }
  function setBrainLive(html){ $('bt0').innerHTML=html; $('bt1').innerHTML=html; }

  let manual=null;
  function applyResp(){ if(manual!==null)return; document.body.classList.toggle('m', innerWidth<760); }
  function setDevice(m){ manual=m; document.body.classList.toggle('m',m); $('dvM').classList.toggle('on',m); $('dvD').classList.toggle('on',!m); }
  addEventListener('resize',applyResp); applyResp();

  function toggleAgent(id,e){ e.stopPropagation(); $(id).classList.toggle('open'); }
  function pickAgent(n,e){ e.stopPropagation(); ['ag0','ag1'].forEach(id=>{ $(id).querySelector('.agent-trigger').textContent='⚡ '+n+' ▾'; [...$(id).querySelector('.menu').children].forEach(b=>b.classList.toggle('on',b.textContent.includes(n))); $(id).classList.remove('open'); }); }
  addEventListener('click',()=>{ $('ag0')?.classList.remove('open'); $('ag1')?.classList.remove('open'); });
  addEventListener('keydown',e=>{ if(e.key==='Escape') closeTakeover(); });

  let lastArt=null;
  function openTakeover(title,tag,html,tagStyle){ lastArt={title,tag,html,tagStyle}; $('tkTitle').textContent=title; $('tkTag').textContent=tag||''; $('tkTag').setAttribute('style',tagStyle||''); $('tkBody').innerHTML=html; $('takeover').classList.add('on'); return $('tkBody'); }
  function closeTakeover(){ $('takeover').classList.remove('on'); }

  async function send(id){
    const text=$(id).value.trim(); if(!text||busy) return;
    if(!document.body.classList.contains('chatting')){ document.body.classList.add('chatting'); hero.classList.add('gone'); conv.classList.add('on'); dock.classList.add('on'); }
    $('ta0').value=''; $('ta1').value=''; autosize($('ta0')); autosize($('ta1'));
    conv.appendChild(el(`<div class="u"></div>`)).textContent=text;
    busy=true; tg(); document.body.classList.add('busy'); setBrainLive('<span style="color:var(--violet)">tänker…</span>'); down();
    await turn(text); busy=false; tg(); document.body.classList.remove('busy'); setBrain('gemma4 · redo'); $('ta1').focus();
  }

  async function turn(text){
    const isEdit=/redigera|lägg till|flagga|config/i.test(text);
    const isCode=!isEdit && /python|kod|sträng|reverse|vänd/i.test(text);
    const isComp=/öppna|anteckningar|klicka/i.test(text) && !isEdit;
    const isFile=/cv|downloads|hitta|sök|fil/i.test(text);
    const isReason=/bevisa|irrationell|matematik|roten|reasoning/i.test(text);
    const route=(isEdit||isCode)?'kod':(isComp||isFile)?'dator':'chatt';

    const turnEl=el(`<div class="turn"><div class="rail"><div class="mk">✦</div></div><div class="body"></div></div>`);
    conv.appendChild(turnEl); const body=turnEl.querySelector('.body'); down();
    const steps=[]; let consult=null, tools=0;
    const log=(t)=>steps.push(t);

    await sleep(550); // think

    if(isEdit){
      consult='qwen2.5-coder'; setBrainLive('frågar <span style="color:var(--violet)">qwen2.5-coder</span>…'); log('Konsulterar <span class="ex">qwen2.5-coder:14b</span>'); await sleep(850);
      tools++; log('Verktyg <b>read_file</b> · backend/config.py'); await sleep(450);
      const tag='background:rgba(84,217,140,.15);color:var(--add)';
      openTakeover('backend/config.py','+3 −1',`<div class="diff" id="dz"></div>`,tag);
      const dz=$('dz'); const lines=[['ctx','  MAX_AGENT_STEPS = env_int("MAX_AGENT_STEPS", 20)'],['del','- VISION_ENABLED = True'],['add','+ VISION_ENABLED = env_bool("VISION_ENABLED", False)'],['add','+ VISION_MODEL = env("OLLAMA_VISION_MODEL", "gemma4")'],['add','+ # opt-in: text-perception är default'],['ctx','  BACKEND_PORT = env_int("BACKEND_PORT", 8000)']];
      for(const [k,t] of lines){ dz.appendChild(el(`<div class="ln2 ${k}">${t}</div>`)); await sleep(120); }
      await answer(body,route,steps,consult,tools,`Klart. La till en opt-in-flagga <code>VISION_ENABLED</code> (default av). Sätt <code>VISION_ENABLED=true</code> i .env för att slå på den.`,null,{label:'diff: backend/config.py',title:'backend/config.py',tag:'+3 −1',html:diffHtml(),style:tag});
    } else if(isCode){
      consult='qwen2.5-coder'; setBrainLive('frågar <span style="color:var(--violet)">qwen2.5-coder</span>…'); log('Konsulterar <span class="ex">qwen2.5-coder:14b</span>'); await sleep(900);
      await answer(body,route,steps,consult,tools,`En kort funktion som vänder en sträng:`,`def reverse(s):\n    return s[::-1]\n\nreverse("hej")  # "jeh"`);
    } else if(isComp){
      tools+=2; setBrainLive('styr datorn…'); log('Perception · Set-of-Marks'); await sleep(650); log('Verktyg <b>type_text</b>("Hej")'); await sleep(600);
      const tag='background:rgba(79,214,224,.15);color:var(--cyan)';
      openTakeover('Anteckningar','live',shotHtml(),tag);
      await answer(body,route,steps,consult,tools,`Öppnade Anteckningar och skrev "Hej" — klickade redigeringsytan via element-listan ([1]), bekräftat med UI Automation.`,null,{label:'skärm: Anteckningar',title:'Anteckningar',tag:'live',html:shotHtml(),style:tag});
    } else if(isFile){
      tools++; setBrainLive('söker filer…'); log('Verktyg <b>search_files</b> · "CV" · ~'); await sleep(850);
      const tag='color:var(--dim)';
      openTakeover('3 träffar','~/',filesHtml(),tag);
      await answer(body,route,steps,consult,tools,`Hittade tre CV-filer i din hemkatalog. Senast: <code>Downloads/Lucas_CV.pdf</code>. Vill du öppna den?`,null,{label:'3 träffar',title:'3 träffar',tag:'~/',html:filesHtml(),style:tag});
    } else if(isReason){
      consult='qwen3 + deepseek'; setBrainLive('frågar <span style="color:var(--violet)">qwen3</span>…');
      const tag='color:var(--violet)';
      const tb=openTakeover('Modell-hand-offs','live · 2 experter',graphHtml(),tag);
      log('Konsulterar <span class="ex">qwen3:14b</span>'); g(tb,'cn-reason',1); g(tb,'ce-reason',1); await sleep(1000); g(tb,'cn-reason',0); g(tb,'ce-reason',0);
      setBrainLive('dubbelkollar <span style="color:var(--violet)">deepseek</span>…');
      log('Dubbelkollar <span class="ex">deepseek-r1</span>'); g(tb,'cn-deep',1); g(tb,'ce-deep',1); await sleep(900); g(tb,'cn-deep',0); g(tb,'ce-deep',0);
      await answer(body,route,steps,consult,tools,`Antag √2 = p/q i lägsta form ⇒ p² = 2q² ⇒ p jämnt ⇒ p=2k ⇒ q² = 2k² ⇒ q jämnt. Då delar 2 både p och q — motsägelse. Alltså är √2 irrationellt. ∎`,null,{label:'orkestrering',title:'Modell-hand-offs',tag:'2 experter',html:graphHtml(),style:tag});
    } else {
      await answer(body,route,steps,consult,tools,`Jag kör helt lokalt och kan koda, styra datorn, söka och resonera. Säg vad du vill göra så visar jag resultatet i fokus.`);
    }
  }

  function g(scope,id,on){ scope.querySelector('#'+id)?.classList.toggle('active',!!on); }
  function diffHtml(){ const lines=[['ctx','  MAX_AGENT_STEPS = env_int("MAX_AGENT_STEPS", 20)'],['del','- VISION_ENABLED = True'],['add','+ VISION_ENABLED = env_bool("VISION_ENABLED", False)'],['add','+ VISION_MODEL = env("OLLAMA_VISION_MODEL", "gemma4")'],['add','+ # opt-in: text-perception är default'],['ctx','  BACKEND_PORT = env_int("BACKEND_PORT", 8000)']]; return `<div class="diff">${lines.map(([k,t])=>`<div class="ln2 ${k}">${t}</div>`).join('')}</div>`; }
  function shotHtml(){ return `<div class="shot"><div class="bar2"><i></i><i></i><i></i><span class="u2">Untitled — Anteckningar</span></div><div class="win"><div class="mark"><span class="tagn">[1] redigeringsyta</span></div><div class="note">Hej_</div></div></div>`; }
  function filesHtml(){ return [['Downloads/Lucas_CV.pdf','184 kB · 30 maj'],['Downloads/Lucas_CV_2024.pdf','12 nov 2024'],['Documents/CV/old_cv.pdf','2023']].map(([f,m])=>`<div class="frow"><span class="fi">📄</span><span class="fn">${f}</span><span class="fm">${m}</span></div>`).join(''); }
  function graphHtml(){ return `<div class="ggraph"><svg viewBox="0 0 400 300" preserveAspectRatio="none">
    <path class="ge" id="ce-coder" d="M200,150 L330,70"></path><path class="ge" id="ce-reason" d="M200,150 L340,225"></path><path class="ge" id="ce-deep" d="M200,150 L75,235"></path><path class="ge" id="ce-embed" d="M200,150 L65,72"></path></svg>
    <div class="gn c" style="left:50%;top:50%"><div class="o">✦</div><div class="l">gemma4</div></div>
    <div class="gn" id="cn-coder" style="left:82%;top:23%"><div class="o">⌨</div><div class="l">coder</div></div>
    <div class="gn" id="cn-reason" style="left:85%;top:75%"><div class="o">🧠</div><div class="l">qwen3</div></div>
    <div class="gn" id="cn-deep" style="left:18%;top:78%"><div class="o">🔬</div><div class="l">deepseek</div></div>
    <div class="gn" id="cn-embed" style="left:16%;top:24%"><div class="o">💾</div><div class="l">nomic</div></div></div>`; }

  async function answer(body,route,steps,consult,tools,text,code,artRef){
    body.appendChild(el(`<div class="rbadge">${route}</div>`));
    const p=el(`<div class="prose"><span class="cur"></span></div>`); body.appendChild(p); const c=p.querySelector('.cur');
    const plain=text.replace(/<[^>]+>/g,''); for(let i=0;i<plain.length;i++){ p.insertBefore(document.createTextNode(plain[i]),c); if(i%2===0){down(); await sleep(6);} }
    p.innerHTML=text; down();
    if(code){ const cb=el(`<div class="codeblk"></div>`); body.appendChild(cb); for(let i=0;i<code.length;i++){ cb.appendChild(document.createTextNode(code[i])); if(i%2===0){down(); await sleep(6);} } }
    // chips: reopen artifact + insyn
    const chips=el(`<div class="chips"></div>`); body.appendChild(chips);
    if(artRef){ const a=el(`<button class="chip art">⤢ ${artRef.label}</button>`); a.onclick=()=>openTakeover(artRef.title,artRef.tag,artRef.html,artRef.style); chips.appendChild(a); }
    const parts=['gemma4']; if(consult)parts.push('frågade '+consult); if(tools)parts.push(tools+' verktyg');
    const ins=el(`<button class="chip">⟡ ${steps.length} steg</button>`); chips.appendChild(ins);
    const stepsBox=el(`<div class="insteps">${steps.map(s=>`<div class="istep"><div class="dot">✓</div><div class="t">${s}</div></div>`).join('')}</div>`); body.appendChild(stepsBox);
    ins.onclick=()=>stepsBox.classList.toggle('on');
    down();
  }
</script>
