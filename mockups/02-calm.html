<!doctype html>
<html lang="sv" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pilot — Förslag 2: Calm</title>
<style>
  :root[data-theme="dark"] {
    --bg: #0d1117; --bg-grad: #11151f; --surface: #161b26; --surface-2: #1c2230;
    --border: #232a39; --text: #e8ecf4; --muted: #8a93a6; --muted-2: #5b6477;
    --accent: #6e8bff; --accent-2: #8a6bff; --on-accent: #fff;
    --bubble-a: #171d29; --green: #3ecf8e; --blue: #4cc4ff;
    --sheet: #141925; --shadow: 0 20px 50px rgba(0,0,0,.5);
  }
  :root[data-theme="light"] {
    --bg: #f4f6fb; --bg-grad: #eef1f8; --surface: #ffffff; --surface-2: #f6f8fc;
    --border: #e2e7f0; --text: #1a2030; --muted: #65708a; --muted-2: #9aa3b6;
    --accent: #5a6ef0; --accent-2: #8a6bff; --on-accent: #fff;
    --bubble-a: #ffffff; --green: #14a06a; --blue: #1e90d8;
    --sheet: #ffffff; --shadow: 0 20px 50px rgba(60,70,120,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid; place-items: center;
    transition: background .3s, color .3s;
  }
  button { font: inherit; cursor: pointer; color: inherit; border: none; background: none; }
  .mono { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }

  /* phone frame on desktop; full-bleed on mobile */
  .phone {
    width: 420px; height: 860px; max-height: 96vh; position: relative;
    background: linear-gradient(180deg, var(--bg-grad), var(--bg));
    border-radius: 38px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow), 0 0 0 10px rgba(0,0,0,.18);
    display: flex; flex-direction: column;
    transition: background .3s, border-color .3s;
  }
  @media (max-width: 480px) {
    body { display: block; }
    .phone { width: 100%; height: 100dvh; max-height: none; border-radius: 0; border: none; box-shadow: none; }
  }

  /* top bar */
  .bar { display: flex; align-items: center; gap: 11px; padding: 16px 18px 12px; }
  .logo { width: 34px; height: 34px; border-radius: 11px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: grid; place-items: center; color: #fff; font-size: 17px; box-shadow: 0 6px 16px rgba(110,139,255,.45); }
  .bar .ttl { font-weight: 700; font-size: 17px; letter-spacing: -.3px; }
  .bar .st { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .bar .st .d { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .bar .sp { flex: 1; }
  .round { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; color: var(--muted); transition: .15s; font-size: 16px; }
  .round:hover { background: var(--surface); color: var(--text); }

  /* scroll area */
  .scroll { flex: 1; overflow-y: auto; padding: 6px 16px 12px; scrollbar-width: thin; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  /* empty / welcome */
  .welcome { padding: 8px 4px; }
  .hi { font-size: 25px; font-weight: 700; letter-spacing: -.5px; line-height: 1.25; margin-bottom: 6px; }
  .hi .grad { background: linear-gradient(120deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--muted); margin-bottom: 20px; }
  .sugg { display: flex; flex-direction: column; gap: 10px; }
  .scard { display: flex; align-items: center; gap: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 13px 15px; text-align: left; transition: .15s; }
  .scard:hover, .scard:active { transform: translateY(-1px); border-color: color-mix(in srgb, var(--accent) 50%, var(--border)); }
  .scard .e { width: 38px; height: 38px; flex-shrink: 0; border-radius: 11px; display: grid; place-items: center; font-size: 18px; background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .scard .h { font-weight: 600; font-size: 14.5px; }
  .scard .d { font-size: 12.5px; color: var(--muted); }
  .scard .go { margin-left: auto; color: var(--muted-2); }

  /* messages */
  .day { text-align: center; font-size: 11px; color: var(--muted-2); margin: 12px 0; }
  .row { display: flex; margin: 10px 0; }
  .row.u { justify-content: flex-end; }
  .bub { max-width: 84%; padding: 11px 15px; border-radius: 20px; line-height: 1.5; font-size: 14.5px; }
  .row.u .bub { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border-bottom-right-radius: 6px; }
  .row.a .bub { background: var(--bubble-a); border: 1px solid var(--border); border-bottom-left-radius: 6px; }
  .a-meta { display: flex; align-items: center; gap: 7px; margin: 0 0 5px 3px; }
  .a-meta .tag { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
  .tag.chat { background: color-mix(in srgb, var(--muted) 18%, transparent); color: var(--muted); }
  .tag.computer { background: color-mix(in srgb, var(--blue) 18%, transparent); color: var(--blue); }
  .tag.code { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }
  .a-meta .mdl { font-size: 11px; color: var(--muted); }
  .bub code { background: color-mix(in srgb, var(--accent) 10%, transparent); padding: 1px 6px; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 13px; }
  .codeblk { background: color-mix(in srgb, var(--accent) 7%, var(--surface-2)); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-top: 7px; font-family: ui-monospace, monospace; font-size: 12.5px; white-space: pre-wrap; color: color-mix(in srgb, var(--accent) 80%, var(--text)); }

  /* inline working stepper */
  .work { margin: 8px 0 8px 3px; border-left: 2px solid var(--border); padding-left: 14px; display: flex; flex-direction: column; gap: 11px; }
  .step { display: flex; gap: 10px; align-items: flex-start; opacity: 0; transform: translateX(-4px); animation: stepin .3s forwards; }
  @keyframes stepin { to { opacity: 1; transform: none; } }
  .step .si { width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; display: grid; place-items: center; font-size: 11px; background: var(--surface); border: 1px solid var(--border); margin-left: -25px; }
  .step.act .si { background: color-mix(in srgb, var(--accent) 18%, transparent); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }
  .step .sl { font-size: 13px; }
  .step .sl b { font-weight: 600; }
  .step .sd { font-size: 11.5px; color: var(--muted); }
  .dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--muted); margin: 0 1.5px; animation: bb 1.2s infinite; }
  .dots span:nth-child(2){ animation-delay:.2s; } .dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes bb { 0%,60%,100%{ transform: translateY(0); opacity:.4; } 30%{ transform: translateY(-4px); opacity:1; } }

  /* result */
  .res { margin: 6px 0 0 3px; background: color-mix(in srgb, var(--green) 9%, transparent); border: 1px solid color-mix(in srgb, var(--green) 35%, transparent); border-radius: 14px; padding: 11px 14px; }
  .res .rh { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--green); margin-bottom: 3px; }

  /* composer */
  .composer { padding: 10px 14px calc(14px + env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg) 70%, transparent); }
  .quickrow { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 9px; scrollbar-width: none; }
  .quickrow::-webkit-scrollbar { display: none; }
  .qchip { white-space: nowrap; font-size: 12.5px; color: var(--muted); border: 1px solid var(--border); background: var(--surface); border-radius: 999px; padding: 6px 12px; transition: .12s; }
  .qchip:hover { color: var(--text); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }
  .inp { display: flex; align-items: flex-end; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 7px 7px 7px 16px; transition: .15s; }
  .inp:focus-within { border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent); }
  .inp textarea { flex: 1; border: none; background: none; outline: none; resize: none; color: var(--text); font: inherit; max-height: 120px; padding: 6px 0; }
  .inp textarea::placeholder { color: var(--muted-2); }
  .snd { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; transition: .15s; }
  .snd:disabled { background: var(--border); color: var(--muted-2); }
  .snd:not(:disabled):hover { transform: scale(1.06); }

  /* settings sheet */
  .scrim { position: absolute; inset: 0; background: rgba(0,0,0,.45); opacity: 0; pointer-events: none; transition: .25s; z-index: 20; }
  .scrim.on { opacity: 1; pointer-events: auto; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--sheet); border-radius: 26px 26px 0 0; padding: 8px 20px calc(24px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform .3s cubic-bezier(.2,.9,.3,1); z-index: 21; border-top: 1px solid var(--border); }
  .sheet.on { transform: none; }
  .grip { width: 40px; height: 4px; border-radius: 4px; background: var(--border); margin: 8px auto 16px; }
  .sheet h3 { font-size: 16px; margin-bottom: 4px; }
  .sheet .sp { color: var(--muted); font-size: 12.5px; margin-bottom: 18px; }
  .setrow { margin-bottom: 18px; }
  .setrow .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 9px; }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg button { flex: 1; min-width: 64px; padding: 9px; border-radius: 11px; border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-weight: 600; background: var(--surface); transition: .12s; }
  .seg button.on { background: color-mix(in srgb, var(--accent) 16%, transparent); border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); color: var(--text); }
  select.fld { width: 100%; padding: 10px 12px; border-radius: 11px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font: inherit; }
  .themetoggle { display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>
<div class="phone">
  <header class="bar">
    <div class="logo">✦</div>
    <div><div class="ttl">Pilot</div><div class="st"><span class="d"></span> Ansluten · auto</div></div>
    <div class="sp"></div>
    <button class="round" title="Tema" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="round" title="Inställningar" onclick="openSheet()">⚙</button>
  </header>

  <div class="scroll" id="scroll">
    <div class="welcome" id="welcome">
      <div class="hi">Hej Lucas.<br><span class="grad">Vad ska vi fixa idag?</span></div>
      <p class="sub">Jag kör lokalt på din dator och kan chatta, styra datorn, koda och söka.</p>
      <div class="sugg">
        <button class="scard" onclick="quick('Hitta mitt CV i Downloads')"><span class="e">🔎</span><div><div class="h">Hitta mitt CV</div><div class="d">Sök i hela hemkatalogen</div></div><span class="go">›</span></button>
        <button class="scard" onclick="quick('Vad gör det här projektet?')"><span class="e">📁</span><div><div class="h">Förklara projektet</div><div class="d">Läs README och sammanfatta</div></div><span class="go">›</span></button>
        <button class="scard" onclick="quick('Vänd strängen hej i Python')"><span class="e">⌨</span><div><div class="h">Skriv lite kod</div><div class="d">Lokalt med qwen2.5-coder</div></div><span class="go">›</span></button>
        <button class="scard" onclick="quick('Påminn mig kl 17 att ta en paus')"><span class="e">⏰</span><div><div class="h">Påminn mig</div><div class="d">Schemalägg en uppgift</div></div><span class="go">›</span></button>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="quickrow" id="quickrow">
      <button class="qchip" onclick="quick('Vad är klockan?')">🕐 Vad är klockan?</button>
      <button class="qchip" onclick="quick('Öppna Anteckningar')">🖥 Öppna app</button>
      <button class="qchip" onclick="quick('Väder i Stockholm')">🌤 Väder</button>
      <button class="qchip" onclick="quick('Visa GitHub-issues')">🐙 Issues</button>
    </div>
    <div class="inp">
      <textarea id="ta" rows="1" placeholder="Meddelande till Pilot…" oninput="autosize(this);tg()" onkeydown="onKey(event)"></textarea>
      <button class="snd" id="snd" disabled onclick="send()">➤</button>
    </div>
  </div>

  <!-- settings sheet -->
  <div class="scrim" id="scrim" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <h3>Inställningar</h3>
    <p class="sp">Gäller den här konversationen.</p>
    <div class="setrow">
      <div class="lbl">Läge</div>
      <div class="seg" data-group="route"><button class="on">Auto</button><button>Chatt</button><button>Dator</button><button>Kod</button></div>
    </div>
    <div class="setrow">
      <div class="lbl">Modell</div>
      <select class="fld"><option>Auto (väljer själv)</option><option>gemma4</option><option>qwen3:14b</option><option>qwen2.5-coder:14b</option><option>deepseek-r1:14b</option></select>
    </div>
    <div class="setrow">
      <div class="lbl">Kod-agent</div>
      <div class="seg" data-group="agent"><button class="on">Lokal</button><button>Claude Code</button><button>Codex</button></div>
    </div>
    <div class="setrow themetoggle">
      <div><div class="lbl" style="margin:0">Utseende</div></div>
      <div class="seg" data-group="theme" style="flex:0"><button onclick="setTheme('dark')" id="tDark" class="on">Mörkt</button><button onclick="setTheme('light')" id="tLight">Ljust</button></div>
    </div>
  </div>
</div>

<script>
  const scroll=document.getElementById('scroll'), ta=document.getElementById('ta'), snd=document.getElementById('snd');
  const sheet=document.getElementById('sheet'), scrim=document.getElementById('scrim');
  let busy=false;
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  function tg(){ snd.disabled=!ta.value.trim()||busy; }
  function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }
  function quick(t){ ta.value=t; autosize(ta); tg(); ta.focus(); }
  function openSheet(){ scrim.classList.add('on'); sheet.classList.add('on'); }
  function closeSheet(){ scrim.classList.remove('on'); sheet.classList.remove('on'); }
  function toggleTheme(){ const r=document.documentElement; setTheme(r.getAttribute('data-theme')==='dark'?'light':'dark'); }
  function setTheme(t){ document.documentElement.setAttribute('data-theme',t); document.getElementById('themeBtn').textContent = t==='dark'?'🌙':'☀️';
    document.getElementById('tDark').classList.toggle('on',t==='dark'); document.getElementById('tLight').classList.toggle('on',t==='light'); }
  document.querySelectorAll('.seg[data-group="route"],.seg[data-group="agent"]').forEach(g=>g.addEventListener('click',e=>{const b=e.target.closest('button'); if(!b)return; [...g.children].forEach(x=>x.classList.remove('on')); b.classList.add('on');}));

  function el(h){ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; }
  function down(){ scroll.scrollTop=scroll.scrollHeight; }

  async function send(){
    const text=ta.value.trim(); if(!text||busy) return;
    document.getElementById('welcome')?.remove();
    const u=el(`<div class="row u"><div class="bub"></div></div>`); u.querySelector('.bub').textContent=text; scroll.appendChild(u);
    ta.value=''; autosize(ta); busy=true; tg(); down();
    await turn(text); busy=false; tg();
  }

  async function turn(text){
    const isCode=/python|kod|sträng|reverse|vänd/i.test(text);
    const isFile=/cv|fil|downloads|hitta|sök/i.test(text);
    const route=isCode?'code':isFile?'computer':'chat';
    const label={code:'⌨ Kod',computer:'🖥 Dator',chat:'💬 Chatt'}[route];

    // working stepper
    const work=el(`<div class="work"></div>`); scroll.appendChild(work); down();
    function step(cls,icon,label,desc){ const s=el(`<div class="step ${cls}"><div class="si">${icon}</div><div><div class="sl">${label}</div>${desc?`<div class="sd">${desc}</div>`:''}</div></div>`); work.appendChild(s); down(); return s; }

    step('','💭','Tänker','Tolkar din förfrågan'); await sleep(650);
    if(isCode){ step('act','🔀','Frågar <b>qwen2.5-coder</b>','Kodspecialist'); await sleep(900); }
    else if(isFile){ step('act','⚡','Kör <b>search_files</b>','query: "CV" · ~ · *.pdf'); await sleep(950); }
    step('','✓','Sammanställer svaret','<span class="dots"><span></span><span></span><span></span></span>'); await sleep(700);
    work.remove();

    const a=el(`<div class="row a"><div style="max-width:90%">
      <div class="a-meta"><span class="tag ${route}">${label}</span><span class="mdl">🧠 gemma4</span></div>
      <div class="bub"></div></div></div>`);
    scroll.appendChild(a); const bub=a.querySelector('.bub'); down();

    if(isCode){
      await type(bub,`Klart — en kort funktion som vänder en sträng:`);
      const c=el(`<div class="codeblk"></div>`); bub.appendChild(c); await type(c,`def reverse(s):\n    return s[::-1]\n\nreverse("hej")  # "jeh"`);
    } else if(isFile){
      await type(bub,`Hittade tre filer i din hemkatalog:\n\n• Downloads\\Lucas_CV.pdf (184 kB · 30 maj)\n• Downloads\\Lucas_CV_2024.pdf\n• Documents\\CV\\old_cv.pdf`);
      const r=el(`<div class="res"><div class="rh">Förslag</div>Öppna den senaste? Säg bara "öppna den".</div>`); a.querySelector('div').appendChild(r); down();
    } else if(/påminn|kl 17|paus/i.test(text)){
      await type(bub,`Klart! Jag har lagt till en påminnelse: "ta en paus" varje dag kl 17:00. Du hittar den under ⏰ Jobb.`);
    } else {
      await type(bub,`Jag kan svara, styra datorn, koda lokalt och söka på webben. Allt körs på din egen maskin via Ollama. Prova ett av förslagen ovan!`);
    }
    down();
  }

  async function type(node,text){ for(let i=0;i<text.length;i++){ node.appendChild(document.createTextNode(text[i])); if(i%2===0){down(); await sleep(8);} } }
</script>
</body>
</html>
