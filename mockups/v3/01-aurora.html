<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pilot — Aurora</title>
<style>
  :root {
    --bg: #0a0a0e;
    --bg-soft: #0e0e14;
    --panel: #14141c;
    --panel-2: #1a1a24;
    --border: #222230;
    --border-2: #2d2d3d;
    --text: #f1f1f5;
    --dim: #8c8c9c;
    --dim-2: #5a5a6a;
    --accent: #8b7bff;
    --cyan: #4fd6e0;
    --rose: #ff8fb0;
    --green: #54d98c;
    --violet: #b69cff;
    --amber: #f6c453;
    --grad: linear-gradient(110deg, #8b7bff, #4fd6e0);
    --aurora: radial-gradient(120% 120% at 30% 0%, rgba(139,123,255,.20), transparent 55%), radial-gradient(120% 120% at 100% 30%, rgba(79,214,224,.16), transparent 55%), radial-gradient(120% 120% at 70% 100%, rgba(255,143,176,.12), transparent 55%);
    --add:#54d98c; --del:#f0857c;
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font: 15px/1.6 var(--sans); -webkit-font-smoothing: antialiased; overflow: hidden; }
  button { font: inherit; cursor: pointer; color: inherit; border: none; background: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: #1f1f2b; border-radius: 8px; }

  .devbar { position: fixed; top: 12px; right: 14px; z-index: 80; display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .devbar button { font: 11px var(--mono); color: var(--dim); padding: 4px 9px; border-radius: 6px; }
  .devbar button.on { background: var(--panel-2); color: var(--text); }

  /* aurora glow behind everything, intensifies when busy */
  .glow { position: fixed; inset: 0; background: var(--aurora); opacity: .5; pointer-events: none; transition: opacity 1.2s; z-index: 0; }
  body.busy .glow { opacity: 1; }

  .app { position: relative; z-index: 1; height: 100vh; display: grid; grid-template-columns: minmax(0,1fr) 0; transition: grid-template-columns .4s cubic-bezier(.2,.9,.3,1); }
  .app.stage-open { grid-template-columns: minmax(0,1fr) minmax(360px, 0.8fr); }
  body.m .app, body.m .app.stage-open { grid-template-columns: 1fr; }

  /* top bar — minimal: identity + project breadcrumb + front-brain + agent */
  .top { display: flex; align-items: center; gap: 10px; padding: 14px 22px; }
  .top .mk { width: 27px; height: 27px; border-radius: 8px; background: var(--grad); display: grid; place-items: center; color: #08080d; font-weight: 900; font-size: 13px; }
  .top .nm { font-weight: 700; letter-spacing: -.2px; }
  .top .crumb { font: 12px var(--mono); color: var(--dim); border-radius: 7px; padding: 3px 8px; transition: .12s; }
  .top .crumb:hover { background: var(--panel); color: var(--text); }
  .top .crumb .car { color: var(--dim-2); }
  .top .sp { flex: 1; }
  /* front-brain indicator (model — informational, auto) */
  .brain { display: flex; align-items: center; gap: 8px; font: 11.5px var(--mono); color: var(--dim); padding: 5px 11px; border-radius: 999px; border: 1px solid var(--border); transition: .2s; }
  .brain .orb { width: 9px; height: 9px; border-radius: 50%; background: var(--grad); box-shadow: 0 0 8px rgba(139,123,255,.6); transition: .2s; }
  body.busy .brain .orb { animation: breathe 1.1s infinite; }
  @keyframes breathe { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.45); } }
  /* agent control (kept accessible) */
  .agent { position: relative; }
  .agent-trigger { font: 11.5px var(--mono); color: var(--dim); border: 1px solid var(--border); border-radius: 999px; padding: 5px 11px; transition: .12s; }
  .agent-trigger:hover { color: var(--text); border-color: var(--border-2); }
  .agent .menu { position: absolute; top: 110%; right: 0; background: var(--panel); border: 1px solid var(--border-2); border-radius: 11px; padding: 5px; display: none; flex-direction: column; gap: 2px; min-width: 160px; box-shadow: 0 16px 40px rgba(0,0,0,.5); z-index: 20; }
  .agent.open .menu { display: flex; }
  .agent .menu button { text-align: left; font: 12px var(--sans); color: var(--dim); padding: 8px 10px; border-radius: 8px; }
  .agent .menu button:hover { background: var(--panel-2); color: var(--text); }
  .agent .menu button.on { color: var(--text); } .agent .menu button.on::after { content:" ✓"; color: var(--cyan); }
  .top .conn { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); }

  /* main column */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .scroll { flex: 1; overflow-y: auto; }

  /* hero (empty) */
  .hero { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 22px; }
  .hero.gone { display: none; }
  .greet { font-size: clamp(26px,4vw,36px); font-weight: 760; letter-spacing: -1px; text-align: center; line-height: 1.15; }
  .greet .g { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tag { color: var(--dim); margin: 10px 0 28px; text-align: center; }
  .ghosts { display: flex; gap: 9px; flex-wrap: wrap; justify-content: center; max-width: 520px; margin-top: 22px; }
  .ghost { font-size: 13px; color: var(--dim); border: 1px solid var(--border); border-radius: 999px; padding: 8px 15px; transition: .15s; }
  .ghost:hover { color: var(--text); border-color: var(--border-2); transform: translateY(-1px); }

  /* conversation */
  .conv { display: none; max-width: 720px; margin: 0 auto; width: 100%; padding: 14px 22px 24px; flex-direction: column; gap: 24px; }
  .conv.on { display: flex; }
  .u { align-self: flex-end; max-width: 80%; background: var(--panel-2); border: 1px solid var(--border); padding: 11px 16px; border-radius: 16px 16px 5px 16px; }
  .turn { display: flex; gap: 13px; }
  .turn .rail { width: 24px; flex-shrink: 0; }
  .turn .rail .mk { width: 24px; height: 24px; border-radius: 8px; background: var(--grad); display: grid; place-items: center; color: #08080d; font-weight: 900; font-size: 12px; }
  .turn .body { flex: 1; min-width: 0; }

  /* calm expandable insyn */
  .insyn { margin-bottom: 9px; }
  .insyn .bar { display: inline-flex; align-items: center; gap: 9px; font: 12px var(--mono); color: var(--dim); border: 1px solid var(--border); background: var(--panel); border-radius: 999px; padding: 5px 13px; cursor: pointer; transition: .12s; }
  .insyn .bar:hover { border-color: var(--border-2); color: var(--text); }
  .insyn .bar .sp { display:inline-block; animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }
  .insyn .bar .chev { transition: .2s; color: var(--dim-2); }
  .insyn.open .bar .chev { transform: rotate(90deg); }
  .insyn .body { display: none; margin: 10px 0 4px; border-left: 1.5px solid var(--border); padding-left: 14px; }
  .insyn.open .body { display: block; }
  .step { display: flex; gap: 10px; padding: 4px 0; align-items: flex-start; }
  .step .d { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-2); flex-shrink: 0; margin-top: 2px; display: grid; place-items: center; font-size: 8px; color: var(--dim); }
  .step.done .d { border-color: var(--green); color: var(--green); }
  .step .l { font: 12.5px var(--sans); color: var(--dim); } .step .l b { color: var(--text); } .step .l .ex { font: 11.5px var(--mono); color: var(--violet); }

  .rbadge { display: inline-block; font: 10px var(--mono); text-transform: uppercase; letter-spacing: .06em; color: var(--dim-2); margin-bottom: 6px; }
  .prose { font-size: 15px; line-height: 1.7; }
  .prose code { font: 13px var(--mono); background: var(--panel-2); padding: 1px 6px; border-radius: 5px; }
  .codeblk { font: 13px/1.6 var(--mono); background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; margin-top: 10px; white-space: pre-wrap; color: #cfd8ff; }
  .cur { display: inline-block; width: 8px; height: 16px; background: var(--accent); vertical-align: -3px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  /* small "öppna scen" link under an answer that has an artifact */
  .stagelink { display: inline-flex; align-items: center; gap: 7px; margin-top: 12px; font: 12px var(--mono); color: var(--cyan); border: 1px solid rgba(79,214,224,.3); border-radius: 9px; padding: 6px 11px; }
  .stagelink:hover { background: rgba(79,214,224,.08); }

  /* composer */
  .dock { padding: 0 22px 24px; }
  .hero .composer { width: 100%; max-width: 600px; }
  .dock .composer { max-width: 720px; margin: 0 auto; }
  .box { background: var(--panel); border: 1.5px solid var(--border-2); border-radius: 18px; box-shadow: 0 12px 44px rgba(0,0,0,.35); transition: .18s; }
  .box:focus-within { border-color: transparent; background: linear-gradient(var(--panel),var(--panel)) padding-box, var(--grad) border-box; box-shadow: 0 14px 50px rgba(139,123,255,.16); }
  .l1 { display: flex; align-items: flex-end; gap: 8px; padding: 9px 9px 5px 15px; }
  .box textarea { flex: 1; background: none; border: none; resize: none; outline: none; color: var(--text); font: 15px var(--sans); max-height: 150px; padding: 5px 0; }
  .box textarea::placeholder { color: var(--dim-2); }
  .send { width: 38px; height: 38px; border-radius: 12px; background: var(--grad); color: #08080d; font-weight: 900; font-size: 16px; display: grid; place-items: center; flex-shrink: 0; transition: .15s; }
  .send:disabled { background: var(--border-2); color: var(--dim-2); }
  .send:not(:disabled):hover { transform: scale(1.06); }
  .l2 { display: flex; align-items: center; gap: 10px; padding: 0 12px 9px; font: 11px var(--mono); color: var(--dim-2); }
  .l2 .hint { margin-left: auto; } body.m .l2 .hint { display: none; }

  /* ── stage ── */
  .stage { background: var(--bg-soft); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-width: 0; }
  .app:not(.stage-open) .stage { display: none; }
  .shead { display: flex; align-items: center; gap: 9px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .shead .t { font: 11px var(--mono); text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }
  .shead .pill { margin-left: auto; font: 10.5px var(--mono); color: var(--dim); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; }
  .shead .x { width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; color: var(--dim); }
  .shead .x:hover { background: var(--panel); color: var(--text); }
  .sbody { flex: 1; overflow-y: auto; padding: 16px; }
  .panecard { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; overflow: hidden; animation: rise .35s cubic-bezier(.2,.9,.3,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
  .pc-h { display: flex; align-items: center; gap: 8px; padding: 9px 13px; border-bottom: 1px solid var(--border); font: 11.5px var(--mono); color: var(--dim); }
  .pc-h .nm { color: var(--text); } .pc-h .tg { margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 5px; }
  .pc-b { padding: 13px; }
  .diff { font: 12px/1.55 var(--mono); }
  .diff .ln { padding: 1px 11px; white-space: pre-wrap; }
  .diff .ln.add { background: rgba(84,217,140,.12); color: var(--add); }
  .diff .ln.del { background: rgba(240,133,124,.12); color: var(--del); }
  .diff .ln.ctx { color: var(--dim); }
  .shot { border-radius: 9px; overflow: hidden; border: 1px solid var(--border); }
  .shot .bar { background:#1c2230; padding:6px 10px; display:flex; gap:6px; align-items:center; }
  .shot .bar i { width:9px; height:9px; border-radius:50%; } .shot .bar i:nth-child(1){background:#ff5f57}.shot .bar i:nth-child(2){background:#febc2e}.shot .bar i:nth-child(3){background:#28c840}
  .shot .bar .u2 { margin-left:8px; font:10px var(--mono); color:var(--dim); background:#0f131c; padding:2px 8px; border-radius:5px; }
  .shot .win { background: linear-gradient(160deg,#0e1422,#0b0f18); padding:16px; min-height:140px; position:relative; }
  .shot .note { background:#f7f4e9; color:#222; border-radius:5px; padding:10px; font:12px var(--mono); width:70%; margin-top:30px; box-shadow:0 8px 20px rgba(0,0,0,.4); }
  .shot .mark { position:absolute; border:2px solid var(--cyan); border-radius:5px; box-shadow:0 0 0 3px rgba(79,214,224,.2); left:16px; top:16px; right:16px; height:42px; }
  .shot .mark .tagn { position:absolute; top:-9px; left:-2px; background:var(--cyan); color:#042; font:9px var(--mono); padding:0 4px; border-radius:3px; }
  .frow { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; } .frow:hover { background: var(--panel-2); }
  .frow .fi { color: var(--cyan); } .frow .fn { font:12.5px var(--mono); } .frow .fm { margin-left:auto; font:11px var(--mono); color:var(--dim-2); }
  .ggraph { position:relative; height:200px; }
  .ggraph svg { position:absolute; inset:0; width:100%; height:100%; }
  .gn { position:absolute; transform:translate(-50%,-50%); text-align:center; }
  .gn .o { width:44px; height:44px; border-radius:13px; display:grid; place-items:center; font-size:16px; border:1.5px solid var(--border); background:var(--panel-2); margin:0 auto 4px; transition:.3s; }
  .gn.c .o { width:54px; height:54px; border-color:rgba(139,123,255,.5); background:radial-gradient(circle at 50% 40%, rgba(139,123,255,.18), var(--panel-2)); box-shadow:0 0 20px rgba(139,123,255,.25); }
  .gn .l { font:9.5px var(--mono); color:var(--dim); }
  .gn.active .o { border-color:var(--violet); box-shadow:0 0 22px rgba(182,156,255,.5); transform:scale(1.08); }
  .ge { stroke:var(--border); stroke-width:1.5; fill:none; transition:.3s; }
  .ge.active { stroke:var(--violet); stroke-width:2.5; stroke-dasharray:5 4; animation:flow .6s linear infinite; filter:drop-shadow(0 0 4px var(--violet)); }
  @keyframes flow { to { stroke-dashoffset:-18; } }

  /* mobile stage = bottom sheet */
  body.m .stage { position: fixed; inset: 0; top: auto; height: 80vh; z-index: 50; border-left: none; border-top: 1px solid var(--border-2); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform .35s cubic-bezier(.2,.9,.3,1); box-shadow: 0 -20px 50px rgba(0,0,0,.5); display: flex; }
  body.m .app.stage-open .stage { transform: none; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="devbar"><button id="dvD" class="on" onclick="setDevice(false)">🖥 Desktop</button><button id="dvM" onclick="setDevice(true)">📱 Mobil</button></div>

<div class="app" id="app">
  <section class="main">
    <header class="top">
      <div class="mk">✦</div><span class="nm">Pilot</span>
      <button class="crumb" onclick="alert('Liten projektväljare — projekt härleds men går att byta här')">/ pilot <span class="car">▾</span></button>
      <span class="sp"></span>
      <span class="brain" title="Pilot väljer modell automatiskt"><span class="orb"></span> <span id="brainTxt">gemma4</span></span>
      <div class="agent" id="agentBtn">
        <button class="agent-trigger" id="agentLabel" onclick="toggleAgent(event)">⚡ lokal ▾</button>
        <div class="menu" id="agentMenu">
          <button class="on" onclick="pickAgent('lokal',event)">⚡ Lokal (qwen2.5-coder)</button>
          <button onclick="pickAgent('Claude Code',event)">◆ Claude Code</button>
          <button onclick="pickAgent('Codex',event)">◇ Codex</button>
        </div>
      </div>
      <span class="conn" title="Ansluten"></span>
    </header>

    <div class="scroll" id="scroll">
      <div class="hero" id="hero">
        <div>
          <div class="greet">God kväll, Lucas.<br><span class="g">Vad ska vi göra?</span></div>
          <div class="tag">Lokal AI som chattar, kodar och styr datorn — den listar ut hur själv.</div>
        </div>
        <div class="composer">
          <div class="box">
            <div class="l1"><textarea id="ta0" rows="1" placeholder="Be Pilot om vad som helst…" oninput="mirror(this)" onkeydown="onKey(event,'ta0')"></textarea><button class="send" id="go0" disabled onclick="send('ta0')">➤</button></div>
            <div class="l2"><span>↵ skicka · ⇧↵ ny rad</span></div>
          </div>
          <div class="ghosts">
            <button class="ghost" onclick="seed('Vänd strängen hej i Python')">⌨ Vänd en sträng</button>
            <button class="ghost" onclick="seed('Hitta mitt CV i Downloads')">🔎 Hitta mitt CV</button>
            <button class="ghost" onclick="seed('Lägg till en vision-flagga i backend/config.py')">✎ Redigera kod</button>
            <button class="ghost" onclick="seed('Öppna Anteckningar och skriv Hej')">🖥 Styr datorn</button>
          </div>
        </div>
      </div>
      <div class="conv" id="conv"></div>
    </div>

    <div class="dock" id="dock" style="display:none">
      <div class="composer">
        <div class="box">
          <div class="l1"><textarea id="ta1" rows="1" placeholder="Fortsätt…" oninput="mirror(this)" onkeydown="onKey(event,'ta1')"></textarea><button class="send" id="go1" disabled onclick="send('ta1')">➤</button></div>
          <div class="l2"><span class="hint">↵ skicka · ⇧↵ ny rad</span></div>
        </div>
      </div>
    </div>
  </section>

  <aside class="stage" id="stage">
    <header class="shead"><span class="t" id="stageTitle">Scen</span><span class="pill" id="stagePill"></span><button class="x" onclick="closeStage()">✕</button></header>
    <div class="sbody" id="sbody"></div>
  </aside>
</div>

<script>
  const $=id=>document.getElementById(id);
  const app=$('app'),scroll=$('scroll'),conv=$('conv'),hero=$('hero'),dock=$('dock'),stage=$('stage'),sbody=$('sbody');
  let busy=false; const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  function el(h){ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; }
  function down(){ scroll.scrollTop=scroll.scrollHeight; }
  function autosize(e){ e.style.height='auto'; e.style.height=Math.min(e.scrollHeight,150)+'px'; }
  function tg(){ $('go0').disabled=!$('ta0').value.trim()||busy; $('go1').disabled=!$('ta1').value.trim()||busy; }
  function mirror(src){ $('ta0').value=src.value; $('ta1').value=src.value; autosize($('ta0')); autosize($('ta1')); tg(); }
  function onKey(e,id){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(id); } }
  function seed(t){ $('ta0').value=t; $('ta1').value=t; tg(); (busy?$('ta1'):$('ta0')).focus(); }

  let manual=null;
  function applyResp(){ if(manual!==null)return; document.body.classList.toggle('m', innerWidth<900); }
  function setDevice(m){ manual=m; document.body.classList.toggle('m',m); $('dvM').classList.toggle('on',m); $('dvD').classList.toggle('on',!m); }
  addEventListener('resize',applyResp); applyResp();

  function toggleAgent(e){ e.stopPropagation(); $('agentBtn').classList.toggle('open'); }
  function pickAgent(n,e){ e.stopPropagation(); $('agentLabel').textContent='⚡ '+n+' ▾'; [...$('agentMenu').children].forEach(b=>b.classList.toggle('on',b.textContent.includes(n))); $('agentBtn').classList.remove('open'); }
  addEventListener('click',()=>$('agentBtn')?.classList.remove('open'));

  function openStage(title,pill){ app.classList.add('stage-open'); $('stageTitle').textContent=title; $('stagePill').textContent=pill||''; }
  function closeStage(){ app.classList.remove('stage-open'); }
  function stageCard(head,body){ sbody.innerHTML=`<div class="panecard"><div class="pc-h">${head}</div><div class="pc-b">${body}</div></div>`; return sbody.querySelector('.pc-b'); }

  async function send(id){
    const text=$(id).value.trim(); if(!text||busy) return;
    if(!document.body.classList.contains('chatting')){ document.body.classList.add('chatting'); hero.classList.add('gone'); conv.classList.add('on'); dock.style.display='block'; }
    $('ta0').value=''; $('ta1').value=''; autosize($('ta0')); autosize($('ta1'));
    conv.appendChild(el(`<div class="u"></div>`)).textContent=text;
    busy=true; tg(); document.body.classList.add('busy'); down();
    await turn(text); busy=false; tg(); document.body.classList.remove('busy'); $('ta1').focus();
  }

  async function turn(text){
    const isEdit=/redigera|lägg till|flagga|config/i.test(text);
    const isCode=!isEdit && /python|kod|sträng|reverse|vänd/i.test(text);
    const isComp=/öppna|anteckningar|klicka/i.test(text) && !isEdit;
    const isFile=/cv|downloads|hitta|sök|fil/i.test(text);
    const isReason=/bevisa|irrationell|matematik|roten|reasoning/i.test(text);
    const isJob=/påminn|kl 17|paus|schemalägg/i.test(text);
    const route=(isEdit||isCode)?'kod':(isComp||isFile||isJob)?'dator':'chatt';

    const turnEl=el(`<div class="turn"><div class="rail"><div class="mk">✦</div></div><div class="body">
      <div class="insyn"><div class="bar"><span class="sp">◔</span><span class="lbl">Tänker…</span><span class="chev">›</span></div><div class="ibody"></div></div></div></div>`);
    conv.appendChild(turnEl); down();
    const insyn=turnEl.querySelector('.insyn'), bar=insyn.querySelector('.bar'), ibody=insyn.querySelector('.ibody'), body=turnEl.querySelector('.body');
    bar.onclick=()=>insyn.classList.toggle('open');
    const steps=[]; let consult=null, tools=0;
    function addStep(label){ const s=el(`<div class="step"><div class="d">◔</div><div class="l">${label}</div></div>`); ibody.appendChild(s); steps.push(s); return s; }
    function doneLast(){ const s=steps[steps.length-1]; if(s){ s.classList.add('done'); s.querySelector('.d').textContent='✓'; } }
    function setBar(txt,spin){ bar.querySelector('.lbl').innerHTML=txt; bar.querySelector('.sp').style.display=spin?'inline-block':'none'; }

    addStep('Tänker — tolkar förfrågan'); await sleep(620); doneLast();

    if(isEdit){
      consult='qwen2.5-coder'; setBar('Frågar <span style="color:var(--violet)">qwen2.5-coder</span>…',true); addStep('Konsulterar <span class="ex">qwen2.5-coder:14b</span>'); await sleep(850); doneLast();
      tools++; addStep('Verktyg <b>read_file</b> · backend/config.py'); await sleep(500); doneLast();
      openStage('Diff','backend/config.py');
      const dz=stageCard(`<span>✎</span><span class="nm">backend/config.py</span><span class="tg" style="background:rgba(84,217,140,.15);color:var(--add)">+3 −1</span>`,`<div class="diff" id="dz"></div>`);
      const lines=[['ctx','  MAX_AGENT_STEPS = env_int("MAX_AGENT_STEPS", 20)'],['del','- VISION_ENABLED = True'],['add','+ VISION_ENABLED = env_bool("VISION_ENABLED", False)'],['add','+ VISION_MODEL = env("OLLAMA_VISION_MODEL", "gemma4")'],['add','+ # opt-in: text-perception är default'],['ctx','  BACKEND_PORT = env_int("BACKEND_PORT", 8000)']];
      for(const [k,t] of lines){ dz.appendChild(el(`<div class="ln ${k}">${t}</div>`)); await sleep(120); }
      finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`Klart. La till en opt-in-flagga <code>VISION_ENABLED</code> (default av). Diffen ser du på scenen — sätt <code>VISION_ENABLED=true</code> i .env för att slå på den.`,null,'Visa diff',()=>openStage('Diff','backend/config.py'));
    } else if(isCode){
      consult='qwen2.5-coder'; setBar('Frågar <span style="color:var(--violet)">qwen2.5-coder</span>…',true); addStep('Konsulterar <span class="ex">qwen2.5-coder:14b</span>'); await sleep(900); doneLast();
      finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`En kort funktion som vänder en sträng:`,`def reverse(s):\n    return s[::-1]\n\nreverse("hej")  # "jeh"`);
    } else if(isComp){
      tools+=2; addStep('Perception · Set-of-Marks'); await sleep(650); doneLast();
      openStage('Skärm','live · UIA');
      stageCard(`<span>🖥</span><span class="nm">Anteckningar</span><span class="tg" style="background:rgba(79,214,224,.15);color:var(--cyan)">live</span>`,
        `<div class="shot"><div class="bar"><i></i><i></i><i></i><span class="u2">Untitled — Anteckningar</span></div><div class="win"><div class="mark"><span class="tagn">[1] redigeringsyta</span></div><div class="note">Hej_</div></div></div>`);
      addStep('Verktyg <b>type_text</b>("Hej")'); await sleep(650); doneLast();
      finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`Öppnade Anteckningar och skrev "Hej". Jag klickade på redigeringsytan via element-listan ([1]) — ingen gissad pixel — och bekräftade med UI Automation.`,null,'Visa skärm',()=>openStage('Skärm','live · UIA'));
    } else if(isFile){
      tools++; setBar('Söker filer…',true); addStep('Verktyg <b>search_files</b> · query "CV" · ~'); await sleep(850); doneLast();
      openStage('Sökträffar','search_files · ~');
      stageCard(`<span>🔎</span><span class="nm">3 träffar</span><span class="tg" style="color:var(--dim)">~/</span>`,
        [['Downloads/Lucas_CV.pdf','184 kB · 30 maj'],['Downloads/Lucas_CV_2024.pdf','12 nov 2024'],['Documents/CV/old_cv.pdf','2023']].map(([f,m])=>`<div class="frow"><span class="fi">📄</span><span class="fn">${f}</span><span class="fm">${m}</span></div>`).join(''));
      finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`Hittade tre CV-filer i din hemkatalog (se scenen). Senast: <code>Downloads/Lucas_CV.pdf</code>. Vill du öppna den?`,null,'Visa träffar',()=>openStage('Sökträffar','search_files · ~'));
    } else if(isReason){
      consult='qwen3 + deepseek'; setBar('Frågar <span style="color:var(--violet)">qwen3</span>…',true);
      openStage('Orkestrering','live · 2 experter');
      stageCard(`<span>🧠</span><span class="nm">Modell-hand-offs</span><span class="tg" style="color:var(--violet)">live</span>`,graph());
      addStep('Konsulterar <span class="ex">qwen3:14b</span>'); g('cn-reason',1); g('ce-reason',1); await sleep(950); doneLast(); g('cn-reason',0); g('ce-reason',0);
      addStep('Dubbelkollar <span class="ex">deepseek-r1</span>'); g('cn-deep',1); g('ce-deep',1); await sleep(850); doneLast(); g('cn-deep',0); g('ce-deep',0);
      finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`Antag √2 = p/q i lägsta form ⇒ p² = 2q² ⇒ p jämnt ⇒ p=2k ⇒ q² = 2k² ⇒ q jämnt. Då delar 2 både p och q — motsägelse. Alltså är √2 irrationellt. ∎`,null,'Visa orkestrering',()=>openStage('Orkestrering','2 experter'));
    } else if(isJob){
      tools++; addStep('Verktyg <b>add_job</b> · dagligen 17:00'); await sleep(600); doneLast();
      finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`Klart — påminnelsen "ta en paus" körs dagligen kl 17:00.`);
    } else {
      await sleep(300); finishInsyn(setBar,insyn,consult,tools);
      await answer(body,route,`Jag kör helt lokalt och kan koda, styra datorn, söka och resonera — och kopplar in en specialistmodell när det behövs. Säg vad du vill göra.`);
    }
  }

  function finishInsyn(setBar,insyn,consult,tools){
    const parts=['gemma4']; if(consult) parts.push('frågade '+consult); if(tools) parts.push(tools+' verktyg');
    setBar('✓ '+parts.join(' · '),false);
  }
  function g(id,on){ document.getElementById(id)?.classList.toggle('active',!!on); }
  function graph(){ return `<div class="ggraph"><svg viewBox="0 0 300 200" preserveAspectRatio="none">
    <path class="ge" id="ce-coder" d="M150,100 L250,45"></path><path class="ge" id="ce-reason" d="M150,100 L255,150"></path>
    <path class="ge" id="ce-deep" d="M150,100 L55,155"></path><path class="ge" id="ce-embed" d="M150,100 L50,48"></path></svg>
    <div class="gn c" style="left:50%;top:50%"><div class="o">✦</div><div class="l">gemma4</div></div>
    <div class="gn" id="cn-coder" style="left:83%;top:22%"><div class="o">⌨</div><div class="l">coder</div></div>
    <div class="gn" id="cn-reason" style="left:85%;top:75%"><div class="o">🧠</div><div class="l">qwen3</div></div>
    <div class="gn" id="cn-deep" style="left:18%;top:78%"><div class="o">🔬</div><div class="l">deepseek</div></div>
    <div class="gn" id="cn-embed" style="left:16%;top:24%"><div class="o">💾</div><div class="l">nomic</div></div></div>`; }

  async function answer(body,route,text,code,linkLabel,linkFn){
    body.appendChild(el(`<div class="rbadge">${route}</div>`));
    const p=el(`<div class="prose"><span class="cur"></span></div>`); body.appendChild(p); const c=p.querySelector('.cur'); down();
    // stream the visible text (tags stripped), then swap in the formatted HTML at the end
    const plain=text.replace(/<[^>]+>/g,'');
    for(let i=0;i<plain.length;i++){ p.insertBefore(document.createTextNode(plain[i]),c); if(i%2===0){down(); await sleep(6);} }
    p.innerHTML=text; down();
    if(code){ const cb=el(`<div class="codeblk"></div>`); body.appendChild(cb); for(let i=0;i<code.length;i++){ cb.appendChild(document.createTextNode(code[i])); if(i%2===0){down(); await sleep(6);} } }
    if(linkLabel){ const lk=el(`<div><button class="stagelink">⤢ ${linkLabel}</button></div>`); body.appendChild(lk); lk.querySelector('button').onclick=linkFn; }
    down();
  }
</script>
</body>
