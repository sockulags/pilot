name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Pilot's scope is deliberately bounded (see "Limitations" in the README).
        Requests that keep the local-first, zero-config default intact are the
        easiest to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Pilot can't do well today?
      placeholder: I want the agent to ... but currently it ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should it do? A rough shape is fine.
    validations:
      required: true
  - type: dropdown
    id: dependency
    attributes:
      label: Does this need a new external dependency or API?
      description: New deps must stay optional and env-gated, with a local fallback.
      options:
        - "No — works with the local default toolchain"
        - "Yes — but it can be optional / env-gated with a fallback"
        - "Yes — and it would be required (please explain why)"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or why existing tools don't cover it.
